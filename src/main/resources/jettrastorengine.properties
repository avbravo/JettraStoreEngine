# JettraStoreEngine Node Configuration
# Defines the IPs and ports of the participating nodes in the Raft Cluster

# Node Identity
jettra.node.id=node-1
jettra.node.host=192.168.1.100
jettra.node.port=9000
jettra.node.port.rest=9089
jettra.node.port.grpc=9090
jettra.node.port.raft=50051

# Cluster Peers (Comma separated list of host:port for Raft consensus)
jettra.cluster.peers=192.168.1.100:50051,192.168.1.101:50051,192.168.1.102:50051

# Storage Configuration
jettra.storage.data.dir=/app/data
jettra.storage.engine.zgc.enabled=true

# Security
jettra.security.jwt.secret=changeme-super-secret-key-for-jwt-signing
jettra.security.default.admin.password=admin
