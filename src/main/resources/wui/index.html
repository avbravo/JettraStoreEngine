<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JettraStore Web UI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e1e2e; color: #cdd6f4; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #313244; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #89b4fa; border-bottom: 2px solid #45475a; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, button, textarea { width: 100%; padding: 10px; border: 1px solid #45475a; border-radius: 4px; background: #1e1e2e; color: #cdd6f4; box-sizing: border-box; }
        button { background: #89b4fa; color: #1e1e2e; font-weight: bold; cursor: pointer; border: none; margin-top: 10px; }
        button:hover { background: #b4befe; }
        .output { background: #11111b; padding: 15px; border-radius: 4px; font-family: monospace; min-height: 100px; white-space: pre-wrap; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>JettraStore Portal</h1>
        
        <div id="loginSection">
            <h3>Authentication</h3>
            <div class="form-group">
                <label>Username:</label>
                <input type="text" id="username" value="super-user">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" value="superUserZ">
            </div>
            <button onclick="login()">Login</button>
        </div>

        <div id="querySection" style="display: none; margin-top: 30px;">
            <h3>Query Model</h3>
            <div class="form-group">
                <label>Model Engine:</label>
                <select id="modelType">
                    <option value="document">Document</option>
                    <option value="vector">Vector</option>
                    <option value="graph">Graph</option>
                    <option value="timeseries">Time-Series</option>
                    <option value="column">Column</option>
                    <option value="keyvalue">Key-Value</option>
                    <option value="geospatial">Geospatial</option>
                    <option value="object">Object</option>
                </select>
            </div>
            <div class="form-group">
                <label>Namespace / Collection:</label>
                <input type="text" id="collection" value="sys_test">
            </div>
            <div class="form-group">
                <label>ID / Key:</label>
                <input type="text" id="docId" value="test_doc_1">
            </div>
            <button onclick="getDocument()">Fetch</button>
        </div>

        <div class="output" id="output">Welcome to JettraStore WUI. Please login.</div>
    </div>

    <script>
        let token = null;

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({username: u, password: p})
                });
                const data = await res.json();
                if (data.token) {
                    token = data.token;
                    document.getElementById('output').innerText = "Logged in successfully!";
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('querySection').style.display = 'block';
                } else {
                    document.getElementById('output').innerText = "Login failed: " + JSON.stringify(data);
                }
            } catch(e) {
                document.getElementById('output').innerText = "Error: " + e.message;
            }
        }

        async function getDocument() {
            const model = document.getElementById('modelType').value;
            const col = document.getElementById('collection').value;
            const id = document.getElementById('docId').value;
            
            try {
                const res = await fetch('/api/model/' + model + '/' + col + '/' + id, {
                    method: 'GET',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                
                if (res.status === 200) {
                    const text = await res.text();
                    try {
                        const data = JSON.parse(text);
                        document.getElementById('output').innerText = JSON.stringify(data, null, 2);
                    } catch(err) {
                        document.getElementById('output').innerText = text;
                    }
                } else {
                    document.getElementById('output').innerText = "Data not found or error. Status: " + res.status;
                }
            } catch(e) {
                document.getElementById('output').innerText = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
